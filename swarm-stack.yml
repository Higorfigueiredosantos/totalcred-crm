version: '3.8'

services:
  backend:
    image: totalcred-backend:latest
    environment:
      - PORT=3001
      - NODE_ENV=production
    volumes:
      - /opt/totalcred/backend/data:/app/data
      - /opt/totalcred/backend/.wwa_sessions:/app/.wwa_sessions
      - /opt/totalcred/backend/.env:/app/.env:ro
    networks:
      - crm-internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  frontend:
    image: totalcred-frontend:latest
    networks:
      - TotalNet
      - crm-internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.totalcred.rule=Host(`app.totalcredsolucoes.com.br`)"
        - "traefik.http.routers.totalcred.entrypoints=websecure"
        - "traefik.http.routers.totalcred.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.totalcred.loadbalancer.server.port=80"

networks:
  TotalNet:
    external: true
    name: TotalNet
  crm-internal:
    driver: overlay
