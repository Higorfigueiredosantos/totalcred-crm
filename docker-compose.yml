version: '3.8'

services:
  backend:
    build: ./backend
    container_name: totalcred-backend
    restart: unless-stopped
    environment:
      - PORT=3001
      - NODE_ENV=production
    volumes:
      - ./backend/data:/app/data
      - ./backend/.wwa_sessions:/app/.wwa_sessions
    networks:
      - crm-network

  frontend:
    build: ./frontend
    container_name: totalcred-frontend
    restart: unless-stopped
    ports:
      - "8090:80"
    depends_on:
      - backend
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge
